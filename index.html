<!DOCTYPE html>
<html lang="ita">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collezione 2025/2026 Il Sogno Centro Sposi</title>

    <!-- EMBED CATALOGO -->
     <iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/c28dfab8ba.html?transparent=1&mobile=true" style="border: 1px solid lightgray; width: 100%; height: 100vh;"></iframe>

     <style>
       body, html {
         margin: 0;
         padding: 0;
         width: 100%;
         height: 100%;
         overflow: hidden;
       }
       
       .fp-iframe {
         display: block;
       }
     </style>

</head>


<body>
    <script>
      // Fix per barra di avanzamento su mobile (orientamento)
      if(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        const iframe = document.querySelector('.fp-iframe');
        
        // Funzione per forzare il refresh dell'iframe
        function refreshIframe() {
          if(iframe) {
            // Ricarica l'iframe per forzare il ricalcolo
            const src = iframe.src;
            iframe.src = '';
            setTimeout(() => {
              iframe.src = src;
            }, 100);
          }
        }
        
        // Rileva il cambio di orientamento
        window.addEventListener('orientationchange', function() {
          setTimeout(refreshIframe, 500);
        });
        
        // Rileva ridimensionamento viewport
        window.addEventListener('resize', function() {
          setTimeout(refreshIframe, 500);
        });
        
        // Anche al caricamento iniziale
        window.addEventListener('load', function() {
          setTimeout(refreshIframe, 1000);
        });
      }
    </script>
    






</body>
</html>
